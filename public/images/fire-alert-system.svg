<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <rect width="600" height="280" fill="#FEF3F2"/>

  <!-- Trigger event (left) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="100" height="100" rx="12" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <!-- Alarm icon -->
    <g transform="translate(30, 20)">
      <path d="M20 0 C8 0 0 10 0 22 L0 32 L40 32 L40 22 C40 10 32 0 20 0Z" fill="#DD3023" opacity="0.3"/>
      <rect x="16" y="32" width="8" height="6" rx="2" fill="#DD3023" opacity="0.4"/>
      <circle cx="20" cy="18" r="4" fill="#F04D41" opacity="0.5"/>
    </g>
    <text x="50" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9A2119" font-weight="500">Threshold</text>
    <text x="50" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9A2119" font-weight="500">Breached</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(150, 125)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#DD3023" stroke-width="2" opacity="0.3"/>
    <polygon points="50,-5 60,0 50,5" fill="#DD3023" opacity="0.4"/>
  </g>

  <!-- Processing hub (center) -->
  <g transform="translate(220, 60)">
    <rect x="0" y="0" width="140" height="140" rx="16" fill="#FFFFFF" stroke="#DD3023" stroke-width="2"/>
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#DD3023" opacity="0.08"/>
    <text x="70" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#BA2419" font-weight="600">ALERT ENGINE</text>

    <!-- Processing lines -->
    <rect x="16" y="45" width="108" height="6" rx="3" fill="#FEE4E2"/>
    <rect x="16" y="45" width="70" height="6" rx="3" fill="#DD3023" opacity="0.3"/>

    <rect x="16" y="60" width="108" height="6" rx="3" fill="#FEE4E2"/>
    <rect x="16" y="60" width="90" height="6" rx="3" fill="#DD3023" opacity="0.25"/>

    <rect x="16" y="75" width="108" height="6" rx="3" fill="#FEE4E2"/>
    <rect x="16" y="75" width="50" height="6" rx="3" fill="#DD3023" opacity="0.35"/>

    <!-- Status -->
    <circle cx="28" cy="105" r="6" fill="#22C55E" opacity="0.5"/>
    <text x="42" y="108" font-family="system-ui, sans-serif" font-size="8" fill="#22C55E" font-weight="500">Active</text>
    <text x="85" y="108" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" opacity="0.5">Multi-channel</text>
  </g>

  <!-- Arrows to outputs -->
  <g transform="translate(370, 95)">
    <line x1="0" y1="0" x2="40" y2="-40" stroke="#DD3023" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="50" y2="0" stroke="#DD3023" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="40" stroke="#DD3023" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Output: SMS -->
  <g transform="translate(420, 30)">
    <rect x="0" y="0" width="130" height="55" rx="10" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <rect x="12" y="10" width="28" height="35" rx="4" fill="#FEE4E2"/>
    <rect x="16" y="14" width="20" height="12" rx="1" fill="#DD3023" opacity="0.2"/>
    <rect x="16" y="30" width="20" height="3" rx="1" fill="#DD3023" opacity="0.15"/>
    <rect x="16" y="36" width="14" height="3" rx="1" fill="#DD3023" opacity="0.1"/>
    <text x="55" y="24" font-family="system-ui, sans-serif" font-size="9" fill="#9A2119" font-weight="600">SMS Alert</text>
    <text x="55" y="38" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">Instant delivery</text>
  </g>

  <!-- Output: App -->
  <g transform="translate(430, 100)">
    <rect x="0" y="0" width="130" height="55" rx="10" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <rect x="12" y="10" width="28" height="35" rx="4" fill="#FEE4E2"/>
    <!-- Bell icon -->
    <path d="M22 18 C18 18 16 22 16 26 L16 30 L34 30 L34 26 C34 22 32 18 28 18Z" fill="#DD3023" opacity="0.3" transform="translate(0,2)"/>
    <circle cx="26" cy="34" r="2" fill="#DD3023" opacity="0.3"/>
    <text x="55" y="24" font-family="system-ui, sans-serif" font-size="9" fill="#9A2119" font-weight="600">App Push</text>
    <text x="55" y="38" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">Mobile notification</text>
  </g>

  <!-- Output: Dashboard -->
  <g transform="translate(420, 175)">
    <rect x="0" y="0" width="130" height="55" rx="10" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <rect x="12" y="10" width="35" height="25" rx="3" fill="#FEE4E2"/>
    <rect x="15" y="13" width="14" height="8" rx="1" fill="#DD3023" opacity="0.25"/>
    <rect x="31" y="13" width="14" height="8" rx="1" fill="#F9766D" opacity="0.2"/>
    <rect x="15" y="24" width="29" height="6" rx="1" fill="#DD3023" opacity="0.15"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-size="9" fill="#9A2119" font-weight="600">Dashboard</text>
    <text x="60" y="38" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">Control room</text>
  </g>

  <!-- Bottom label -->
  <g transform="translate(190, 245)">
    <rect x="0" y="0" width="220" height="28" rx="14" fill="#DD3023" opacity="0.1"/>
    <text x="110" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BA2419" font-weight="500">Automated Multi-Channel Alerts</text>
  </g>
</svg>
