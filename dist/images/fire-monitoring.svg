<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <rect width="600" height="280" fill="#FEF3F2"/>

  <!-- Main monitor screen -->
  <g transform="translate(120, 20)">
    <rect x="0" y="0" width="360" height="210" rx="12" fill="#1F2937"/>
    <rect x="6" y="6" width="348" height="180" rx="8" fill="#111827"/>

    <!-- Screen content - dashboard -->
    <!-- Top bar -->
    <rect x="14" y="14" width="332" height="24" rx="4" fill="#1F2937"/>
    <circle cx="28" cy="26" r="4" fill="#22C55E" opacity="0.7"/>
    <text x="40" y="29" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF">LIVE MONITORING — ALL ZONES</text>
    <circle cx="320" cy="26" r="4" fill="#F04D41" opacity="0.8"/>

    <!-- Grid of zone monitors -->
    <!-- Zone 1 -->
    <rect x="14" y="46" width="105" height="64" rx="4" fill="#1F2937"/>
    <text x="22" y="58" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Zone A — Warehouse</text>
    <rect x="20" y="64" width="40" height="3" rx="1" fill="#22C55E" opacity="0.5"/>
    <rect x="20" y="72" width="30" height="3" rx="1" fill="#22C55E" opacity="0.4"/>
    <rect x="20" y="80" width="50" height="3" rx="1" fill="#22C55E" opacity="0.35"/>
    <circle cx="100" cy="90" r="6" fill="#22C55E" opacity="0.3"/>
    <text x="100" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#22C55E">OK</text>

    <!-- Zone 2 -->
    <rect x="127" y="46" width="105" height="64" rx="4" fill="#1F2937"/>
    <text x="135" y="58" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Zone B — Office</text>
    <rect x="133" y="64" width="45" height="3" rx="1" fill="#22C55E" opacity="0.5"/>
    <rect x="133" y="72" width="35" height="3" rx="1" fill="#22C55E" opacity="0.4"/>
    <rect x="133" y="80" width="55" height="3" rx="1" fill="#22C55E" opacity="0.35"/>
    <circle cx="213" cy="90" r="6" fill="#22C55E" opacity="0.3"/>
    <text x="213" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#22C55E">OK</text>

    <!-- Zone 3 - Alert! -->
    <rect x="240" y="46" width="105" height="64" rx="4" fill="#1F2937"/>
    <rect x="240" y="46" width="105" height="64" rx="4" fill="#F04D41" opacity="0.08"/>
    <text x="248" y="58" font-family="system-ui, sans-serif" font-size="7" fill="#F9766D">Zone C — Factory</text>
    <rect x="246" y="64" width="60" height="3" rx="1" fill="#F04D41" opacity="0.5"/>
    <rect x="246" y="72" width="45" height="3" rx="1" fill="#F9766D" opacity="0.5"/>
    <rect x="246" y="80" width="70" height="3" rx="1" fill="#F04D41" opacity="0.4"/>
    <circle cx="326" cy="90" r="6" fill="#F04D41" opacity="0.5"/>
    <text x="326" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="5" fill="#F04D41" font-weight="700">!</text>

    <!-- Bottom stats -->
    <rect x="14" y="118" width="160" height="60" rx="4" fill="#1F2937"/>
    <text x="22" y="132" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Compliance Score</text>
    <!-- Bar chart -->
    <rect x="22" y="140" width="12" height="28" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="40" y="148" width="12" height="20" rx="2" fill="#22C55E" opacity="0.35"/>
    <rect x="58" y="144" width="12" height="24" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="76" y="136" width="12" height="32" rx="2" fill="#22C55E" opacity="0.5"/>
    <rect x="94" y="150" width="12" height="18" rx="2" fill="#F9766D" opacity="0.4"/>
    <rect x="112" y="142" width="12" height="26" rx="2" fill="#22C55E" opacity="0.4"/>
    <rect x="130" y="138" width="12" height="30" rx="2" fill="#22C55E" opacity="0.45"/>

    <!-- AI analysis panel -->
    <rect x="182" y="118" width="163" height="60" rx="4" fill="#1F2937"/>
    <text x="190" y="132" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">AI Hazard Detection</text>
    <rect x="190" y="140" width="80" height="5" rx="2" fill="#374151"/>
    <rect x="190" y="140" width="55" height="5" rx="2" fill="#F9766D" opacity="0.5"/>
    <text x="280" y="147" font-family="system-ui, sans-serif" font-size="7" fill="#F9766D">2 flags</text>
    <rect x="190" y="152" width="80" height="5" rx="2" fill="#374151"/>
    <rect x="190" y="152" width="72" height="5" rx="2" fill="#22C55E" opacity="0.4"/>
    <text x="280" y="159" font-family="system-ui, sans-serif" font-size="7" fill="#22C55E" opacity="0.7">98% safe</text>
    <rect x="190" y="164" width="80" height="5" rx="2" fill="#374151"/>
    <rect x="190" y="164" width="60" height="5" rx="2" fill="#60A5FA" opacity="0.4"/>
    <text x="280" y="171" font-family="system-ui, sans-serif" font-size="7" fill="#60A5FA" opacity="0.7">Scanning</text>
  </g>

  <!-- Monitor stand -->
  <rect x="270" y="230" width="60" height="8" rx="2" fill="#D1D5DB"/>
  <rect x="250" y="238" width="100" height="6" rx="3" fill="#E5E7EB"/>

  <!-- Camera icons on sides -->
  <g transform="translate(50, 100)">
    <circle cx="20" cy="20" r="18" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="10" fill="#FEE4E2"/>
    <circle cx="20" cy="20" r="5" fill="#DD3023" opacity="0.4"/>
    <circle cx="20" cy="20" r="2" fill="#DD3023" opacity="0.6"/>
    <text x="20" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#9A2119" opacity="0.6">CAM 1</text>
  </g>

  <g transform="translate(520, 100)">
    <circle cx="20" cy="20" r="18" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="10" fill="#FEE4E2"/>
    <circle cx="20" cy="20" r="5" fill="#DD3023" opacity="0.4"/>
    <circle cx="20" cy="20" r="2" fill="#DD3023" opacity="0.6"/>
    <text x="20" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#9A2119" opacity="0.6">CAM 2</text>
  </g>

  <!-- Connection lines -->
  <line x1="88" y1="120" x2="120" y2="120" stroke="#DD3023" stroke-width="1" stroke-dasharray="3 2" opacity="0.2"/>
  <line x1="520" y1="120" x2="480" y2="120" stroke="#DD3023" stroke-width="1" stroke-dasharray="3 2" opacity="0.2"/>

  <!-- Bottom label -->
  <g transform="translate(195, 252)">
    <rect x="0" y="0" width="210" height="24" rx="12" fill="#DD3023" opacity="0.1"/>
    <text x="105" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BA2419" font-weight="500">AI-Powered Safety Surveillance</text>
  </g>
</svg>
