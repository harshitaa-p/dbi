<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <!-- Background -->
  <rect width="800" height="480" fill="#FEF3F2"/>
  <rect width="800" height="480" fill="url(#heroGrad)" opacity="0.6"/>

  <!-- Building silhouette -->
  <rect x="80" y="180" width="180" height="300" rx="4" fill="#1F2937" opacity="0.08"/>
  <rect x="100" y="200" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="145" y="200" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="190" y="200" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="100" y="250" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="145" y="250" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="190" y="250" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="100" y="300" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="145" y="300" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>
  <rect x="190" y="300" width="30" height="30" rx="2" fill="#F04D41" opacity="0.15"/>

  <!-- Factory/warehouse -->
  <rect x="540" y="220" width="200" height="260" rx="4" fill="#1F2937" opacity="0.08"/>
  <rect x="640" y="140" width="40" height="80" rx="2" fill="#1F2937" opacity="0.06"/>
  <rect x="700" y="160" width="30" height="60" rx="2" fill="#1F2937" opacity="0.06"/>
  <rect x="560" y="250" width="40" height="50" rx="2" fill="#F04D41" opacity="0.12"/>
  <rect x="620" y="250" width="40" height="50" rx="2" fill="#F04D41" opacity="0.12"/>
  <rect x="680" y="250" width="40" height="50" rx="2" fill="#F04D41" opacity="0.12"/>

  <!-- Central fire shield icon -->
  <g transform="translate(320, 120)">
    <!-- Shield shape -->
    <path d="M80 0 L160 40 L160 110 C160 170 80 220 80 220 C80 220 0 170 0 110 L0 40 Z" fill="#BA2419" opacity="0.9"/>
    <path d="M80 10 L150 46 L150 108 C150 162 80 208 80 208 C80 208 10 162 10 108 L10 46 Z" fill="#DD3023" opacity="0.9"/>

    <!-- Fire icon inside shield -->
    <g transform="translate(45, 50)">
      <path d="M35 0 C35 0 50 25 50 50 C50 62 45 73 37 80 C42 70 40 58 32 50 C32 50 28 65 20 72 C12 65 5 55 5 42 C5 28 15 15 25 5 C28 2 32 0 35 0Z" fill="#FEF3F2" opacity="0.95"/>
      <path d="M30 35 C30 35 38 48 38 58 C38 66 33 72 27 75 C31 68 29 60 24 55 C24 55 22 63 18 67 C14 63 10 57 10 50 C10 42 16 35 22 30 C24 28 28 27 30 35Z" fill="#F9766D" opacity="0.7"/>
    </g>

    <!-- Checkmark -->
    <path d="M55 130 L72 148 L110 108" stroke="#FEF3F2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Firefighter figure left -->
  <g transform="translate(300, 300)">
    <!-- Helmet -->
    <ellipse cx="20" cy="0" rx="18" ry="10" fill="#BA2419"/>
    <rect x="4" y="-3" width="32" height="14" rx="4" fill="#DD3023"/>
    <!-- Body -->
    <rect x="8" y="14" width="24" height="40" rx="4" fill="#9A2119"/>
    <!-- Stripe -->
    <rect x="8" y="30" width="24" height="4" rx="1" fill="#F9766D" opacity="0.6"/>
    <!-- Legs -->
    <rect x="10" y="54" width="9" height="30" rx="3" fill="#1F2937" opacity="0.3"/>
    <rect x="22" y="54" width="9" height="30" rx="3" fill="#1F2937" opacity="0.3"/>
  </g>

  <!-- Firefighter figure right -->
  <g transform="translate(460, 310)">
    <ellipse cx="20" cy="0" rx="18" ry="10" fill="#BA2419"/>
    <rect x="4" y="-3" width="32" height="14" rx="4" fill="#DD3023"/>
    <rect x="8" y="14" width="24" height="38" rx="4" fill="#9A2119"/>
    <rect x="8" y="28" width="24" height="4" rx="1" fill="#F9766D" opacity="0.6"/>
    <rect x="10" y="52" width="9" height="28" rx="3" fill="#1F2937" opacity="0.3"/>
    <rect x="22" y="52" width="9" height="28" rx="3" fill="#1F2937" opacity="0.3"/>
    <!-- Hose -->
    <path d="M36 30 C50 30 55 25 70 28 C85 31 90 20 100 20" stroke="#9A2119" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Fire extinguisher -->
  <g transform="translate(420, 360)">
    <rect x="5" y="0" width="20" height="8" rx="3" fill="#BA2419"/>
    <rect x="0" y="8" width="30" height="60" rx="6" fill="#DD3023"/>
    <rect x="4" y="14" width="22" height="3" rx="1" fill="#FEF3F2" opacity="0.3"/>
    <path d="M15 0 L15 -12 L22 -18" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  </g>

  <!-- Alarm bell top right -->
  <g transform="translate(650, 80)">
    <circle cx="25" cy="25" r="22" fill="#DD3023" opacity="0.2"/>
    <circle cx="25" cy="25" r="15" fill="#DD3023" opacity="0.3"/>
    <circle cx="25" cy="25" r="8" fill="#F04D41"/>
    <!-- Sound waves -->
    <path d="M52 15 C58 20 58 30 52 35" stroke="#F04D41" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M57 10 C66 18 66 32 57 40" stroke="#F04D41" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
  </g>

  <!-- Sprinkler system top -->
  <g transform="translate(120, 60)">
    <line x1="0" y1="10" x2="100" y2="10" stroke="#1F2937" stroke-width="3" opacity="0.15"/>
    <circle cx="30" cy="16" r="5" fill="#F04D41" opacity="0.3"/>
    <circle cx="70" cy="16" r="5" fill="#F04D41" opacity="0.3"/>
    <!-- Water drops -->
    <ellipse cx="30" cy="28" rx="2" ry="3" fill="#36AAF5" opacity="0.3"/>
    <ellipse cx="34" cy="32" rx="1.5" ry="2.5" fill="#36AAF5" opacity="0.2"/>
    <ellipse cx="70" cy="28" rx="2" ry="3" fill="#36AAF5" opacity="0.3"/>
    <ellipse cx="66" cy="31" rx="1.5" ry="2.5" fill="#36AAF5" opacity="0.2"/>
  </g>

  <!-- Safety cone -->
  <g transform="translate(500, 400)">
    <polygon points="15,0 0,50 30,50" fill="#F04D41" opacity="0.5"/>
    <rect x="-3" y="50" width="36" height="6" rx="2" fill="#1F2937" opacity="0.15"/>
    <rect x="3" y="15" width="24" height="5" rx="1" fill="#FEF3F2" opacity="0.5"/>
    <rect x="6" y="30" width="18" height="4" rx="1" fill="#FEF3F2" opacity="0.4"/>
  </g>

  <!-- Floating particles -->
  <circle cx="200" cy="100" r="3" fill="#F04D41" opacity="0.15"/>
  <circle cx="600" cy="150" r="4" fill="#F04D41" opacity="0.1"/>
  <circle cx="150" cy="350" r="2.5" fill="#DD3023" opacity="0.12"/>
  <circle cx="700" cy="350" r="3" fill="#DD3023" opacity="0.1"/>
  <circle cx="400" cy="80" r="2" fill="#F9766D" opacity="0.2"/>

  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="800" y2="480">
      <stop offset="0%" stop-color="#FEE4E2"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFCDC9" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
