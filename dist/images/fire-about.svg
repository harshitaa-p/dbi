<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#FEF3F2"/>
  <rect width="600" height="400" fill="url(#aboutGrad)" opacity="0.5"/>

  <!-- Timeline / evolution visual -->
  <!-- S.B Fire & Safety (past) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="160" height="120" rx="12" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1.5"/>
    <text x="80" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9A2119" font-weight="600">S.B FIRE & SAFETY</text>
    <line x1="20" y1="42" x2="140" y2="42" stroke="#FEE4E2" stroke-width="1"/>
    <!-- Small extinguisher icon -->
    <g transform="translate(55, 50)">
      <rect x="8" y="0" width="14" height="6" rx="2" fill="#BA2419" opacity="0.6"/>
      <rect x="5" y="6" width="20" height="40" rx="4" fill="#DD3023" opacity="0.5"/>
      <rect x="8" y="12" width="14" height="2" rx="1" fill="#FEF3F2" opacity="0.4"/>
    </g>
    <text x="80" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9A2119" opacity="0.6">Legacy</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(240, 130)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#DD3023" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
    <polygon points="80,-6 92,0 80,6" fill="#DD3023" opacity="0.5"/>
  </g>

  <!-- DBI Fire & Industrial Safety (present) -->
  <g transform="translate(350, 60)">
    <rect x="0" y="0" width="200" height="160" rx="12" fill="#FFFFFF" stroke="#DD3023" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="36" rx="12" fill="#DD3023" opacity="0.1"/>
    <text x="100" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#BA2419" font-weight="700">DBI FIRE & SAFETY</text>

    <!-- Features grid -->
    <g transform="translate(15, 48)">
      <!-- Audit -->
      <rect x="0" y="0" width="78" height="44" rx="6" fill="#FEF3F2"/>
      <circle cx="16" cy="22" r="8" fill="#DD3023" opacity="0.2"/>
      <text x="30" y="18" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" font-weight="500">Audits</text>
      <text x="30" y="28" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">Compliance</text>

      <!-- Training -->
      <rect x="88" y="0" width="78" height="44" rx="6" fill="#FEF3F2"/>
      <circle cx="104" cy="22" r="8" fill="#DD3023" opacity="0.2"/>
      <text x="118" y="18" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" font-weight="500">Training</text>
      <text x="118" y="28" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">Programs</text>

      <!-- Systems -->
      <rect x="0" y="52" width="78" height="44" rx="6" fill="#FEF3F2"/>
      <circle cx="16" cy="74" r="8" fill="#DD3023" opacity="0.2"/>
      <text x="30" y="70" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" font-weight="500">Systems</text>
      <text x="30" y="80" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">IoT + AI</text>

      <!-- Equipment -->
      <rect x="88" y="52" width="78" height="44" rx="6" fill="#FEF3F2"/>
      <circle cx="104" cy="74" r="8" fill="#DD3023" opacity="0.2"/>
      <text x="118" y="70" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" font-weight="500">Equipment</text>
      <text x="118" y="80" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.6">Certified</text>
    </g>
  </g>

  <!-- Atmanirbhar Bharat badge -->
  <g transform="translate(200, 260)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#FFFFFF" stroke="#DD3023" stroke-width="1.5" opacity="0.9"/>
    <circle cx="30" cy="25" r="14" fill="#DD3023" opacity="0.15"/>
    <text x="30" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#DD3023">🇮🇳</text>
    <text x="115" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#BA2419" font-weight="600">Atmanirbhar Bharat</text>
    <text x="115" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" opacity="0.6">Indigenous Safety Solutions</text>
  </g>

  <!-- Government compliance badge -->
  <g transform="translate(80, 260)">
    <rect x="0" y="60" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1"/>
    <circle cx="22" cy="82" r="10" fill="#DD3023" opacity="0.12"/>
    <path d="M18 82 L21 85 L27 79" stroke="#DD3023" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <text x="40" y="79" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" font-weight="500">Govt. Registered</text>
    <text x="40" y="91" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.5">National Standards</text>
  </g>

  <g transform="translate(380, 260)">
    <rect x="0" y="60" width="140" height="45" rx="8" fill="#FFFFFF" stroke="#FFCDC9" stroke-width="1"/>
    <circle cx="22" cy="82" r="10" fill="#DD3023" opacity="0.12"/>
    <path d="M18 82 L21 85 L27 79" stroke="#DD3023" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <text x="40" y="79" font-family="system-ui, sans-serif" font-size="8" fill="#9A2119" font-weight="500">Certified Team</text>
    <text x="40" y="91" font-family="system-ui, sans-serif" font-size="7" fill="#80221C" opacity="0.5">Safety Engineering</text>
  </g>

  <!-- Decorative -->
  <circle cx="50" cy="50" r="20" fill="#DD3023" opacity="0.05"/>
  <circle cx="550" cy="360" r="30" fill="#DD3023" opacity="0.05"/>

  <defs>
    <linearGradient id="aboutGrad" x1="0" y1="0" x2="600" y2="400">
      <stop offset="0%" stop-color="#FEE4E2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFCDC9" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
</svg>
